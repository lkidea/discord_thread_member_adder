name: Populate Discord Thread

# This creates the manual trigger button in the GitHub UI
on:
  workflow_dispatch:
    inputs:
      thread_url:
        description: 'Paste the Discord Thread Link (e.g., https://discord.com/channels/...)'
        required: true
        type: string

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Discord.js
        run: npm install discord.js

      - name: Run Auto-Adder Script
        # We pass the token from your GitHub Secrets, and the link from your text box input
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          THREAD_URL: ${{ inputs.thread_url }}
        run: node populate.js
