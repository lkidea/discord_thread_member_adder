name: Populate Discord Thread

# We completely removed the "inputs" section. 
# The workflow now runs with just a single button click.
on:
  workflow_dispatch:

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Discord.js
        run: npm install discord.js

      - name: Run Auto-Adder Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          # We tell GitHub to securely fetch the link from your new secret vault
          THREAD_URL: ${{ secrets.THREAD_URL }} 
        run: node populate.js
